name: Build and Publish Electron App

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release for this build (uses a generated tag)'
        required: false
        default: 'false'
      prerelease:
        description: 'Mark the Release as prerelease (workflow_dispatch only)'
        required: false
        default: 'true'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: windows-latest
    env:
      VITE_API_BASE_URL: https://shree-ram-physio-backend.azurewebsites.net
      AZURE_BACKEND_URL: https://shree-ram-physio-backend.azurewebsites.net
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        working-directory: Frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $expected = $tag.Substring(1)
          $pkg = node -p "require('./package.json').version"
          Write-Host "Tag: $tag"
          Write-Host "Frontend/package.json version: $pkg"
          if ($pkg -ne $expected) {
            Write-Error "Version mismatch: tag '$tag' expects version '$expected' but Frontend/package.json is '$pkg'. Fix by committing the version bump, then create/push a new tag."
            exit 1
          }

      - name: Build application
        run: npm run build

      - name: Build NSIS installer
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate auto-update artifacts
        if: success()
        shell: pwsh
        run: |
          $latestPath = "release/latest.yml"
          if (-not (Test-Path $latestPath)) {
            throw "Missing $latestPath (electron-builder should generate it)"
          }

          $pathLine = Select-String -Path $latestPath -Pattern '^path:\s*(.+)$' | Select-Object -First 1
          if (-not $pathLine) {
            throw "latest.yml is missing a 'path:' entry"
          }

          $assetName = $pathLine.Matches[0].Groups[1].Value.Trim()
          $assetFile = Join-Path "release" $assetName
          Write-Host "latest.yml path: $assetName"

          if (-not (Test-Path $assetFile)) {
            Write-Host "Release directory contents:"
            Get-ChildItem release | Format-Table Name, Length
            throw "latest.yml references '$assetName' but '$assetFile' does not exist"
          }

          $blockmap = "$assetFile.blockmap"
          if (-not (Test-Path $blockmap)) {
            Write-Host "Warning: blockmap not found at $blockmap"
          }

      - name: Upload installer artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: electron-installer
          path: Frontend/release/*.exe

      - name: Upload latest.yml for auto-updates
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: update-metadata
          path: Frontend/release/latest.yml

      - name: Upload blockmap for differential updates
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: update-blockmap
          path: Frontend/release/*.blockmap

      - name: Generate changelog
        shell: pwsh
        run: |
          $previousTag = git describe --tags --abbrev=0 HEAD^ 2>$null
          if (-not $previousTag) {
            $allTags = git tag --sort=-v:refname | Select-Object -First 2
            if ($allTags.Count -ge 2) { $previousTag = $allTags[1] } else { $previousTag = "" }
          }

          $currentRef = "${{ github.ref_name }}"
          $version = if ($currentRef -match '^v') { $currentRef } else { "v$(node -p "require('./package.json').version")" }

          Write-Host "Generating changelog from $previousTag to $version"

          if ($previousTag) {
            $commits = git log "$previousTag..HEAD" --pretty=format:"- %s (%h)" --no-merges 2>$null
          } else {
            $commits = git log --pretty=format:"- %s (%h)" --no-merges -20 2>$null
          }
          if (-not $commits) { $commits = "- No commits found" }

          $timestamp = Get-Date -Format "yyyy-MM-dd"

          $releaseNotes = @"
          ## $version ($timestamp)

          $commits
          "@

          $releaseNotes | Out-File -FilePath "../RELEASE_NOTES.md" -Encoding utf8
          Write-Host "Changelog written to RELEASE_NOTES.md"

      - name: Delete existing release assets (if any)
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Write-Host "Checking for existing release assets for tag: $tag"

          $repo = $env:GITHUB_REPOSITORY
          $json = gh release view $tag --repo $repo --json assets 2>$null
          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($json)) {
            Write-Host "No existing release found for $tag (nothing to delete)."
            exit 0
          }

          $assets = ($json | ConvertFrom-Json).assets
          foreach ($a in $assets) {
            $name = $a.name
            if ($name -match 'latest\.yml$' -or $name -match '\.blockmap$' -or $name -match '\.exe$') {
              Write-Host "Deleting asset: $name"
              gh release delete-asset $tag $name --repo $repo -y
            }
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            Frontend/release/*.exe
            Frontend/release/latest.yml
            Frontend/release/*.blockmap
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (manual)
        if: github.event_name == 'workflow_dispatch' && inputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: manual-${{ github.run_number }}
          name: Manual build ${{ github.run_number }}
          body_path: RELEASE_NOTES.md
          files: |
            Frontend/release/*.exe
            Frontend/release/latest.yml
            Frontend/release/*.blockmap
          draft: false
          prerelease: ${{ inputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
