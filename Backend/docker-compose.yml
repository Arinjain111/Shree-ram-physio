name: shree-ram-physio

services:
  # ── Local PostgreSQL (mirrors Supabase schema) ──────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: srp_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shri_ram_physio_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network

  # ── Backend API ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: srp_backend
    ports:
      - "3100:3000"
    # Load env vars from .env.docker (local Postgres, no Accelerate)
    env_file:
      - .env.docker
    # Override specific vars to ensure container-internal hostname is used
    environment:
      DATABASE_URL: "postgresql://postgres:password@postgres:5432/shri_ram_physio_dev"
      DIRECT_URL: "postgresql://postgres:password@postgres:5432/shri_ram_physio_dev"
      PORT: 3000
      NODE_ENV: development
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000,http://localhost:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend-network
    restart: unless-stopped
    # On startup: push schema to local Postgres, then start the server.
    # Prisma CLI reads prisma.config.ts via its bundled TS executor (jiti) —
    # no ts-node required. The `prisma` package is in dependencies so it's
    # available after `npm ci --omit=dev`.
    command: >
      sh -c "npx prisma db push && node dist/server.js"

volumes:
  postgres_data:
    driver: local

networks:
  backend-network:
    driver: bridge
